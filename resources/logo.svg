<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 雲端元素：對稱主體輪廓 (背景透明) -->
  <!-- 使用紫色 (#8B5CF6) -->
  <path d="M100,40 
           C75,40 55,55 50,75 
           C25,75 10,90 10,115 
           C10,140 25,155 50,155 
           L150,155 
           C175,155 190,140 190,115 
           C190,90 175,75 150,75 
           C145,55 125,40 100,40 Z" 
        fill="#8B5CF6" />

  <!-- 代碼標籤與機器人複合元素 (純白色) -->
  <g transform="translate(42, 85)">
    <!-- 左括號 < -->
    <path d="M18,12 L8,25 L18,38" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- 機器人元素 -->
    <g transform="translate(38, 0)">
      <!-- 機器人頭部 -->
      <rect x="0" y="5" width="40" height="35" rx="8" fill="#FFFFFF" />
      <!-- 眼睛 (鏤空效果) -->
      <circle cx="12" cy="22" r="3.5" fill="#8B5CF6" />
      <circle cx="28" cy="22" r="3.5" fill="#8B5CF6" />
      <!-- 天線 -->
      <line x1="20" y1="5" x2="20" y2="0" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
      <circle cx="20" cy="-2" r="2.5" fill="#FFFFFF" />
    </g>
    
    <!-- 右括號 > -->
    <path d="M98,12 L108,25 L98,38" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>