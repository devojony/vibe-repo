name: E2E Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e-tests.yml'

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        working-directory: ./frontend
        run: bun install
      
      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: bunx playwright install --with-deps chromium firefox webkit
      
      - name: Run E2E tests
        working-directory: ./frontend
        run: bun run e2e
        env:
          CI: true
      
      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/playwright-report/
          retention-days: 30
      
      - name: Upload JSON test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json
          path: frontend/e2e/test-results.json
          retention-days: 30
      
      - name: Upload test videos and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures
          path: frontend/e2e/test-results/
          retention-days: 30
      
      - name: Upload trace files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/e2e/test-results/**/*.zip
          retention-days: 30
