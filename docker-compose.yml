version: '3.8'

services:
  # VibeRepo API Service - 主后端服务
  vibe-repo-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibe-repo-api
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      # 数据库配置 - 支持 SQLite 和 PostgreSQL
      # 默认使用 SQLite，如需 PostgreSQL 请取消注释下面的行
      - DATABASE_URL=${DATABASE_URL:-sqlite:/data/vibe-repo/db/vibe-repo.db?mode=rwc}
      # - DATABASE_URL=postgresql://vibe_repo:vibe_repo_password@postgres:5432/vibe_repo
      - DATABASE_MAX_CONNECTIONS=${DATABASE_MAX_CONNECTIONS:-10}
      
      # 服务器配置
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_PORT=3000@
      
      # Git Provider 配置
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_BASE_URL=${GITHUB_BASE_URL:-https://api.github.com}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      
      # Agent 配置
      - DEFAULT_AGENT_COMMAND=${DEFAULT_AGENT_COMMAND:-opencode}
      - DEFAULT_AGENT_TIMEOUT=${DEFAULT_AGENT_TIMEOUT:-600}
      - DEFAULT_DOCKER_IMAGE=${DEFAULT_DOCKER_IMAGE:-ubuntu:22.04}
      
      # 日志配置
      - RUST_LOG=${RUST_LOG:-info,vibe_repo=debug}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-1}
    volumes:
      # Docker socket 挂载 - 使 Rust 能够控制宿主机 Docker
      - /var/run/docker.sock:/var/run/docker.sock:rw
      
      # 数据持久化挂载 - 用于仓库、数据库和工作空间
      - vibe_repo_data:/data/vibe-repo
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    restart: unless-stopped
    networks:
      - vibe-repo
    # 启用 Docker-in-Docker 功能
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # PostgreSQL 数据库服务（可选）
  # 如果使用 PostgreSQL，请取消注释此部分
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: vibe-repo-postgres
  #   environment:
  #     - POSTGRES_DB=${POSTGRES_DB:-vibe_repo}
  #     - POSTGRES_USER=${POSTGRES_USER:-vibe_repo}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vibe_repo_password}
  #     - PGDATA=/var/lib/postgresql/data/pgdata
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - vibe-repo
  #   ports:
  #     - "${POSTGRES_PORT:-5432}:5432"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibe_repo}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  # 持久化存储：仓库、数据库和工作树
  vibe_repo_data:
    driver: local
  
  # PostgreSQL 数据持久化（如果使用）
  # postgres_data:
  #   driver: local

networks:
  vibe-repo:
    driver: bridge
    name: vibe-repo-network